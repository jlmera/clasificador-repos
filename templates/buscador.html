<title>BUSCADOR DE REPOSITORIOS</title>
<style>
:root{--bg:#ffffff;--bg2:#f6f8fa;--bg3:#eaeef2;--fg:#1f2328;
--muted:#59636e;--accent:#8FB46B;--accent-h:#496229;--accent2:#125F27;
--border:#d0d7de;--pill:#8FB46B22;--pill-fg:#3D5827;--warn:#9a6700}
*{box-sizing:border-box}
body{margin:0;font-family:ui-sans-serif,system-ui,Segoe UI,Roboto,sans-serif;
background:var(--bg);color:var(--fg);line-height:1.45}
header{padding:10px 24px;border-bottom:1px solid var(--border);background:var(--bg2);
display:flex;align-items:center;gap:14px}
header .logo{flex:0 0 auto;display:flex;align-items:center;justify-content:center}
header .logo svg{display:block;filter:drop-shadow(0 1px 2px rgba(143,180,107,.25))}
header .titles{flex:1 1 auto;min-width:0}
header h1{margin:0;font-size:18px;font-weight:600;letter-spacing:-.2px;color:var(--fg)}
header h1 .accent{color:var(--accent2)}
header .sub{color:var(--muted);font-size:12.5px;margin-top:1px}
header .badge{flex:0 0 auto;background:var(--pill);color:var(--pill-fg);
padding:4px 10px;border-radius:999px;font-size:11.5px;font-family:ui-monospace,Menlo,monospace;
border:1px solid var(--accent);font-weight:600}
main{padding:18px 28px;max-width:1400px;margin:0 auto}
.controls{display:grid;grid-template-columns:1fr 220px 220px 200px;gap:10px;margin-bottom:14px}
@media (max-width:900px){.controls{grid-template-columns:1fr 1fr}}
input,select{width:100%;padding:10px 12px;border-radius:8px;border:1px solid var(--border);
background:var(--bg3);color:var(--fg);font-size:14px;outline:none}
input:focus,select:focus{border-color:var(--accent)}
.stats{display:flex;gap:14px;margin-bottom:18px;flex-wrap:wrap;color:var(--muted);font-size:13px}
.stats span b{color:var(--fg)}
.stats .clear{color:var(--accent);cursor:pointer;text-decoration:underline}
table{width:100%;border-collapse:collapse;background:var(--bg2);border:1px solid var(--border);
border-radius:10px;overflow:hidden;font-size:13.5px}
th{text-align:left;padding:10px 12px;background:var(--bg3);color:var(--muted);
font-weight:500;font-size:12px;text-transform:uppercase;letter-spacing:.5px;
border-bottom:1px solid var(--border);cursor:pointer;user-select:none}
th:hover{color:var(--fg)}
td{padding:10px 12px;vertical-align:top;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}tr:hover{background:#f6f8fa}
td.name{font-weight:600;white-space:nowrap}
td.name a{color:var(--pill-fg);text-decoration:none}
td.name a:hover{text-decoration:underline;color:var(--accent-h)}
.cat-pill{display:inline-block;padding:2px 8px;border-radius:999px;background:var(--pill);
color:var(--pill-fg);font-size:11.5px;font-family:ui-monospace,Menlo,monospace;cursor:pointer}
.lang{font-family:ui-monospace,Menlo,monospace;font-size:12.5px;color:var(--muted)}
.tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.tag{font-size:10.5px;padding:1px 6px;border:1px solid var(--border);border-radius:999px;
color:var(--muted);background:#ffffff;cursor:pointer}
.tag.lang{color:var(--accent2);border-color:#1a7f3744}
.tag.stack{color:var(--warn);border-color:#9a670044}
.desc{color:#1f2328;max-width:520px}
.match{background:#fff8c5;color:#9a6700;padding:0 2px;border-radius:2px}
.btn{font-size:11.5px;padding:3px 8px;border:1px solid var(--border);border-radius:6px;
color:var(--muted);background:var(--bg3);cursor:pointer;text-decoration:none}
.btn:hover{color:var(--fg);border-color:var(--accent)}
.empty{padding:40px;text-align:center;color:var(--muted)}
kbd{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:1px 6px;
font-family:ui-monospace,monospace;font-size:11px}
.warn-row{background:#fff8e6 !important}
</style></head><body>

<label>Por página:</label>
<select class="js-page-size" style="width:80px;padding:4px 8px">
<option value="25" selected>25</option><option value="50">50</option>
<option value="100">100</option><option value="200">200</option><option value="0">Todos</option>
</select>
<button class="js-prev-page btn">← anterior</button>
<span class="js-page-nums" style="display:flex;gap:2px"></span>
<button class="js-next-page btn">siguiente →</button>
</div>
<table id="tbl"><thead><tr>
<th data-sort="consecutivo" style="width:50px">#</th>
<th data-sort="id" style="width:90px">GH ID</th>
<th data-sort="name" style="width:160px">Repo</th>
<th data-sort="categoria" style="width:180px">Categoría</th>
<th data-sort="lenguaje_principal" style="width:90px">Lenguaje</th>
<th data-sort="fecha_agregado" style="width:100px">Fecha</th>
<th>Descripción + tags</th>
<th style="width:110px">Detalle</th>
</tr></thead><tbody id="tbody"></tbody></table>
<div id="empty" class="empty" style="display:none">Sin resultados.</div>
<!-- Paginador inferior: idéntico al superior, sincronizado por clases js-* -->
<div class="paginator-block" id="paginator_b" style="display:flex;gap:10px;align-items:center;margin:14px 0 10px 0;font-size:13px;color:var(--muted);flex-wrap:wrap">
<span class="js-page-info">—</span><span style="margin-left:auto"></span>
<label>Por página:</label>
<select class="js-page-size" style="width:80px;padding:4px 8px">
<option value="25" selected>25</option><option value="50">50</option>
<option value="100">100</option><option value="200">200</option><option value="0">Todos</option>
</select>
<button class="js-prev-page btn">← anterior</button>
<span class="js-page-nums" style="display:flex;gap:2px"></span>
<button class="js-next-page btn">siguiente →</button>
</div>
</main>
<script id="data" type="application/json">__DATA__</script>
<script>
const DATA=JSON.parse(document.getElementById('data').textContent);
const tbody=document.getElementById('tbody'),qEl=document.getElementById('q'),
catEl=document.getElementById('cat'),langEl=document.getElementById('lang'),
stackEl=document.getElementById('stack');
let sortKey='consecutivo',sortDir=1;
let page=1,pageSize=25;
document.getElementById('subtitle').textContent=DATA.length+' repositorios indexados';
document.getElementById('total').textContent=DATA.length;
document.getElementById('badge_total').textContent=DATA.length+' repos';
const cats=[...new Set(DATA.map(r=>r.categoria))].sort();
cats.forEach(c=>catEl.add(new Option(c,c)));
const langs=[...new Set(DATA.map(r=>r.lenguaje_principal))].sort();
langs.forEach(l=>langEl.add(new Option(l,l)));
document.getElementById('catCount').textContent=cats.length;
document.getElementById('langCount').textContent=langs.length;
const esc=s=>(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
const hi=(t,q)=>{if(!q)return esc(t);return esc(t).replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="match">$1</span>')};
const fp=p=>'file:///'+p.replace(/\\/g,'/');
function getFiltered(){
  const q=qEl.value.trim().toLowerCase(),cat=catEl.value,lang=langEl.value,stack=stackEl.value;
  let rows=DATA.filter(r=>{
    if(cat&&r.categoria!==cat)return false;
    if(lang&&r.lenguaje_principal!==lang)return false;
    if(stack&&!(r.stack||[]).includes(stack))return false;
    if(q){const blob=(r.name+' '+r.descripcion+' '+(r.tags||[]).join(' ')+' '+r.lenguaje_principal).toLowerCase();
      if(!q.split(/\s+/).filter(Boolean).every(t=>blob.includes(t)))return false}
    return true});
  rows.sort((a,b)=>{
    let va=a[sortKey],vb=b[sortKey];
    const isNum=v=>v!==null&&v!==undefined&&v!==''&&!isNaN(Number(v));
    if(isNum(va)&&isNum(vb))return(Number(va)-Number(vb))*sortDir;
    if(!isNum(va)&&isNum(vb))return 1;
    if(isNum(va)&&!isNum(vb))return -1;
    va=(va||'').toString().toLowerCase();vb=(vb||'').toString().toLowerCase();
    return va<vb?-sortDir:va>vb?sortDir:0;
  });
  return rows;
}
function render(){
  const q=qEl.value.trim().toLowerCase();
  const rows=getFiltered();
  document.getElementById('count').textContent=rows.length;
  tbody.innerHTML='';
  // Mostrar/ocultar AMBOS paginadores (top y bottom) según haya resultados.
  const paginators=document.querySelectorAll('.paginator-block');
  if(!rows.length){document.getElementById('empty').style.display='block';
    paginators.forEach(p=>p.style.display='none');return}
  document.getElementById('empty').style.display='none';
  paginators.forEach(p=>p.style.display='flex');
  const total=rows.length;
  const totalPages=pageSize>0?Math.max(1,Math.ceil(total/pageSize)):1;
  if(page>totalPages)page=totalPages;if(page<1)page=1;
  const start=pageSize>0?(page-1)*pageSize:0;
  const end=pageSize>0?Math.min(start+pageSize,total):total;
  const pageRows=rows.slice(start,end);
  // Texto "Mostrando N-M de T" en todos los paginadores.
  const infoText=pageSize>0?`Mostrando ${start+1}–${end} de ${total}`:`Mostrando todos (${total})`;
  document.querySelectorAll('.js-page-info').forEach(el=>el.textContent=infoText);
  // Reconstruir los botones numéricos de página en cada paginador.
  if(pageSize>0&&totalPages>1){
    const range=[];const w=3;
    for(let p=Math.max(1,page-w);p<=Math.min(totalPages,page+w);p++)range.push(p);
    if(range[0]>1){range.unshift(1);if(range[1]>2)range.splice(1,0,'…');}
    if(range[range.length-1]<totalPages){
      if(range[range.length-1]<totalPages-1)range.push('…');range.push(totalPages);}
    document.querySelectorAll('.js-page-nums').forEach(nums=>{
      nums.innerHTML='';
      range.forEach(p=>{const b=document.createElement('button');b.className='btn';b.textContent=p;
        if(p===page)b.style.background='var(--accent)',b.style.color='white',b.style.borderColor='var(--accent-h)';
        if(p==='…'){b.disabled=true;b.style.opacity='0.5';b.style.cursor='default';}
        else b.onclick=()=>{page=p;render();};nums.appendChild(b);});
    });
  } else {
    document.querySelectorAll('.js-page-nums').forEach(n=>n.innerHTML='');
  }
  // Habilitar/deshabilitar prev y next en TODOS los paginadores.
  document.querySelectorAll('.js-prev-page').forEach(b=>b.disabled=(page<=1||pageSize===0));
  document.querySelectorAll('.js-next-page').forEach(b=>b.disabled=(page>=totalPages||pageSize===0));
  const frag=document.createDocumentFragment();
  pageRows.forEach(r=>{const tr=document.createElement('tr');
    if(r.necesita_traduccion)tr.className='warn-row';
    const tags=(r.tags||[]).map(t=>{
      const cls=t.startsWith('lang/')?'lang':t.startsWith('stack/')?'stack':'';
      return `<span class="tag ${cls}" data-tag="${esc(t)}">${esc(t)}</span>`}).join('');
    const ghLink=r.url_github?`<a href="${esc(r.url_github)}" target="_blank" class="lang">${r.id||'·'}</a>`:(r.id||'—');
    tr.innerHTML=`<td class="lang">${r.consecutivo?String(r.consecutivo).padStart(2,'0'):'—'}</td>
      <td class="lang">${ghLink}</td>
      <td class="name"><a href="${fp(r.ruta)}">${hi(r.name,q)}</a></td>
      <td><span class="cat-pill" data-cat="${esc(r.categoria)}">${esc(r.categoria)}</span></td>
      <td class="lang">${esc(r.lenguaje_principal||'—')}</td>
      <td class="lang">${esc(r.fecha_agregado||'—')}</td>
      <td><div class="desc">${hi(r.descripcion||'(sin descripción)',q)}${r.necesita_traduccion?' <span style="color:var(--warn)">⚠️ traducir</span>':''}</div>
      <div class="tags">${tags}</div></td>
      <td>
      <a class="btn" href="${r.readme_html?fp(r.readme_html):fp(r.ruta+'\\\\README.md')}" title="Ver README" target="_blank">📖</a>
      ${r.readme_es_html?`<a class="btn" href="${fp(r.readme_es_html)}" title="Ver README en español" target="_blank"><svg viewBox="0 0 6 4" xmlns="http://www.w3.org/2000/svg" width="16" height="11" style="vertical-align:middle;border:1px solid #00000033;border-radius:2px"><rect width="6" height="2" fill="#FCD116"/><rect y="2" width="6" height="1" fill="#003893"/><rect y="3" width="6" height="1" fill="#CE1126"/></svg></a>`:''}
      </td>`;
    frag.appendChild(tr)});
  tbody.appendChild(frag);
  tbody.querySelectorAll('[data-cat]').forEach(el=>el.addEventListener('click',()=>{catEl.value=el.dataset.cat;render()}));
  tbody.querySelectorAll('[data-tag]').forEach(el=>el.addEventListener('click',()=>{qEl.value=el.dataset.tag;render()}));
}
[qEl,catEl,langEl,stackEl].forEach(el=>el.addEventListener('input',()=>{page=1;render();}));
// Listeners en TODOS los <select> y botones de paginación, así sea el de
// arriba o el de abajo el que el usuario use. Los selects de page_size
// también se sincronizan visualmente: si cambias arriba, el de abajo
// muestra el mismo valor (lo refleja el render() en el siguiente paint).
document.querySelectorAll('.js-page-size').forEach(sel=>{
  sel.addEventListener('change',e=>{
    pageSize=parseInt(e.target.value,10);
    // Sincronizar el otro select para que ambos muestren el mismo value.
    document.querySelectorAll('.js-page-size').forEach(s=>{s.value=e.target.value});
    page=1;render();
    // Si el cambio vino del paginador de abajo, hacer scroll al inicio
    // de la tabla para que el usuario no pierda el contexto.
    if(e.target.closest('#paginator_b')) scrollToTbl();
  });
});
document.querySelectorAll('.js-prev-page').forEach(b=>{
  b.addEventListener('click',e=>{
    if(page>1){page--;render();}
    if(e.currentTarget.closest('#paginator_b')) scrollToTbl();
  });
});
document.querySelectorAll('.js-next-page').forEach(b=>{
  b.addEventListener('click',e=>{
    page++;render();
    if(e.currentTarget.closest('#paginator_b')) scrollToTbl();
  });
});
// Cuando el usuario navega desde el paginador de abajo, llevarlo al
// inicio de la tabla para ver la primera fila de la página nueva.
function scrollToTbl(){
  const t=document.getElementById('tbl');
  if(t) t.scrollIntoView({behavior:'smooth',block:'start'});
}
document.querySelectorAll('th[data-sort]').forEach(th=>th.addEventListener('click',()=>{
  const k=th.dataset.sort;if(sortKey===k)sortDir=-sortDir;else{sortKey=k;sortDir=1}render()}));
window.clearFilters=()=>{qEl.value='';catEl.value='';langEl.value='';stackEl.value='';render();qEl.focus()};
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&document.activeElement!==qEl){e.preventDefault();qEl.focus()}
  if(e.key==='Escape'){qEl.blur();clearFilters()}});
render();
</script></body></html>
